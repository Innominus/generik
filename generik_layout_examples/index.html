<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>generik_layout — Swiss editorial layout primitives</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Source Serif 4', Georgia, serif;
            background: #fafaf8;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Inter', 'system-ui', 'sans-serif'],
                        body: ['Source Serif 4', 'Georgia', 'serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
                    },
                    colors: {
                        ink: {
                            DEFAULT: '#1a1a1a',
                            soft: '#444444',
                            muted: '#6b6b6b',
                        },
                        paper: {
                            DEFAULT: '#fafaf8',
                            alt: '#f4f2ee',
                        },
                        rule: '#d8d4cc',
                        accent: '#c1272d',
                    },
                },
            },
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/rust.min.js"></script>
    <script>
        // Called from Rust via js_sys::eval to highlight a code element by id.
        // Defined on `window` so it is reachable from the WASM guest.
        // If highlight.js hasn't finished loading yet, the id is queued and
        // flushed once hljs is ready — so highlighting never silently no-ops.
        window.__hljsQueue = [];
        window.__hljsHighlight = function (id) {
            if (window.hljs) {
                var el = document.getElementById(id);
                if (el) { window.hljs.highlightElement(el); }
            } else {
                window.__hljsQueue.push(id);
            }
        };
        window.addEventListener('load', function () {
            if (window.hljs) {
                window.__hljsQueue.forEach(function (id) {
                    var el = document.getElementById(id);
                    if (el) { window.hljs.highlightElement(el); }
                });
                window.__hljsQueue = [];
            }
        });
    </script>
</head>
<body></body>
</html>
